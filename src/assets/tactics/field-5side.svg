<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <pattern id="grass-5side" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#2d5016"/>
      <rect width="20" height="20" fill="#3a6b1f"/>
      <rect x="20" y="20" width="20" height="20" fill="#3a6b1f"/>
    </pattern>
  </defs>

  <!-- 草地背景 -->
  <rect width="800" height="500" fill="url(#grass-5side)"/>

  <!-- 球场外边框 -->
  <rect x="40" y="40" width="720" height="420" fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- 中线 -->
  <line x1="400" y1="40" x2="400" y2="460" stroke="#ffffff" stroke-width="2"/>

  <!-- 中圈 (5人制缩小) -->
  <circle cx="400" cy="250" r="40" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- 中点 -->
  <circle cx="400" cy="250" r="3" fill="#ffffff"/>

  <!-- 左侧球门区 (5人制小禁区) -->
  <rect x="40" y="170" width="60" height="160" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- 左侧罚球区 (5人制大禁区) -->
  <rect x="40" y="130" width="100" height="240" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- 左侧罚球点 -->
  <circle cx="110" cy="250" r="3" fill="#ffffff"/>

  <!-- 右侧球门区 -->
  <rect x="700" y="170" width="60" height="160" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- 右侧罚球区 -->
  <rect x="660" y="130" width="100" height="240" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- 右侧罚球点 -->
  <circle cx="690" cy="250" r="3" fill="#ffffff"/>

  <!-- 球门标识 -->
  <rect x="20" y="200" width="20" height="100" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="760" y="200" width="20" height="100" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- 角球弧 (简化) -->
  <path d="M 40 45 Q 55 45 55 55" fill="none" stroke="#ffffff" stroke-width="1"/>
  <path d="M 760 45 Q 745 45 745 55" fill="none" stroke="#ffffff" stroke-width="1"/>
  <path d="M 40 455 Q 55 455 55 445" fill="none" stroke="#ffffff" stroke-width="1"/>
  <path d="M 760 455 Q 745 455 745 445" fill="none" stroke="#ffffff" stroke-width="1"/>
</svg>
