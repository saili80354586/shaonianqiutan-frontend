<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <!-- 草地背景 -->
  <rect width="800" height="520" fill="#2d5016"/>
  <rect width="800" height="520" fill="url(#grassPattern)"/>
  
  <defs>
    <pattern id="grassPattern" patternUnits="userSpaceOnUse" width="52" height="52">
      <rect width="52" height="52" fill="#2d5016"/>
      <rect width="26" height="52" fill="#3a6b1f"/>
    </pattern>
  </defs>

  <!-- 球场边界 -->
  <rect x="20" y="20" width="760" height="480" stroke="white" stroke-width="3" rx="3" fill="none"/>
  
  <!-- 中线 -->
  <line x1="400" y1="20" x2="400" y2="500" stroke="white" stroke-width="3"/>
  
  <!-- 中圈 -->
  <circle cx="400" cy="260" r="92" stroke="white" stroke-width="3" fill="none"/>
  <circle cx="400" cy="260" r="5" fill="white"/>

  <!-- 左侧大禁区 -->
  <rect x="20" y="120" width="132" height="280" stroke="white" stroke-width="3" fill="rgba(255,255,255,0.04)"/>
  <!-- 左侧小禁区 -->
  <rect x="20" y="180" width="55" height="160" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.02)"/>
  <!-- 左侧点球点 -->
  <circle cx="115" cy="260" r="4" fill="white"/>
  <!-- 左侧罚球弧 -->
  <path d="M 153 205 Q 175 260 153 315" stroke="white" stroke-width="2" fill="none"/>

  <!-- 右侧大禁区 -->
  <rect x="648" y="120" width="132" height="280" stroke="white" stroke-width="3" fill="rgba(255,255,255,0.04)"/>
  <!-- 右侧小禁区 -->
  <rect x="725" y="180" width="55" height="160" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.02)"/>
  <!-- 右侧点球点 -->
  <circle cx="685" cy="260" r="4" fill="white"/>
  <!-- 右侧罚球弧 -->
  <path d="M 647 205 Q 625 260 647 315" stroke="white" stroke-width="2" fill="none"/>

  <!-- 左角旗区 -->
  <path d="M 20 25 Q 28 20 35 20" stroke="white" stroke-width="2" fill="none"/>
  <path d="M 20 495 Q 28 500 35 500" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- 右角旗区 -->
  <path d="M 780 25 Q 772 20 765 20" stroke="white" stroke-width="2" fill="none"/>
  <path d="M 780 495 Q 772 500 765 500" stroke="white" stroke-width="2" fill="none"/>

  <!-- 左球门 -->
  <rect x="8" y="215" width="12" height="90" stroke="white" stroke-width="3" fill="none"/>
  
  <!-- 右球门 -->
  <rect x="780" y="215" width="12" height="90" stroke="white" stroke-width="3" fill="none"/>
</svg>