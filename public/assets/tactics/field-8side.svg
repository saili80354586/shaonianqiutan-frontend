<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" fill="none">
  <!-- 草地背景 -->
  <rect width="700" height="450" fill="#2d5016"/>
  <rect width="700" height="450" fill="url(#grassPattern)"/>
  
  <defs>
    <pattern id="grassPattern" patternUnits="userSpaceOnUse" width="45" height="45">
      <rect width="45" height="45" fill="#2d5016"/>
      <rect width="22.5" height="45" fill="#3a6b1f"/>
    </pattern>
  </defs>

  <!-- 球场边界 -->
  <rect x="15" y="15" width="670" height="420" stroke="white" stroke-width="2.5" rx="2" fill="none"/>
  
  <!-- 中线 -->
  <line x1="350" y1="15" x2="350" y2="435" stroke="white" stroke-width="2.5"/>
  
  <!-- 中圆 -->
  <circle cx="350" cy="225" r="75" stroke="white" stroke-width="2.5" fill="none"/>
  <circle cx="350" cy="225" r="4" fill="white"/>

  <!-- 左侧禁区（8人制） -->
  <rect x="15" y="110" width="100" height="230" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.05)"/>
  <rect x="15" y="155" width="40" height="140" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="225" r="5" fill="white"/>

  <!-- 右侧禁区 -->
  <rect x="585" y="110" width="100" height="230" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.05)"/>
  <rect x="645" y="155" width="40" height="140" stroke="white" stroke-width="2" fill="rgba(255,255,255,0.03)"/>
  <circle cx="600" cy="225" r="5" fill="white"/>

  <!-- 左球门 -->
  <rect x="5" y="190" width="10" height="70" stroke="white" stroke-width="2.5" fill="none"/>
  
  <!-- 右球门 -->
  <rect x="685" y="190" width="10" height="70" stroke="white" stroke-width="2.5" fill="none"/>
</svg>