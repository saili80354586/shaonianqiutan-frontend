version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - shaonianqiutan-network

  backend:
    image: shaonianqiutan-backend:latest
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=shaonianqiutan
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - shaonianqiutan-network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=shaonianqiutan
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - shaonianqiutan-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - shaonianqiutan-network

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - shaonianqiutan-network

volumes:
  mysql-data:
  redis-data:

networks:
  shaonianqiutan-network:
    driver: bridge
